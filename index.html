<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolocrug — соцсеть колобков</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            transition: background 1.5s ease;
            color: #1d1c1f;
        }

        body.morning {
            background: radial-gradient(circle at 20% 30%, rgba(200, 220, 255, 0.8) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(180, 210, 255, 0.7) 0%, transparent 40%),
                        linear-gradient(145deg, #d4e4ff, #b5d0ff);
        }
        body.day {
            background: radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.9) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(100, 180, 255, 0.6) 0%, transparent 50%),
                        linear-gradient(145deg, #a0d0ff, #7bb3ff);
        }
        body.sunset {
            background: radial-gradient(circle at 30% 40%, rgba(255, 180, 130, 0.6) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(255, 140, 170, 0.5) 0%, transparent 50%),
                        linear-gradient(145deg, #ffb88c, #ffb3c6);
        }
        body.night {
            background: radial-gradient(circle at 20% 30%, rgba(70, 90, 180, 0.4) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(50, 40, 110, 0.5) 0%, transparent 50%),
                        linear-gradient(145deg, #1a1f35, #131a2c);
            color: #f0f0f0;
        }

        .site-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1.2rem 2rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .site-header h1 {
            font-size: 2.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Политика */
        .privacy-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .privacy-popup.hidden { display: none; }
        .privacy-card {
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            color: white;
        }
        .privacy-button.accept {
            background: #1DA1F2;
            border: none;
            padding: 15px 40px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Модалка входа */
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9000;
        }
        .login-card {
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
        }
        .login-card input, .login-card button {
            width: 100%;
            margin: 10px 0;
            padding: 15px;
            border-radius: 60px;
        }
        .login-card input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        .login-card button {
            background: #1DA1F2;
            border: none;
            color: white;
            cursor: pointer;
        }

        /* Основной контент */
        .main-content { display: none; }

        .top-bar {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .kolobok {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .kolobok-small {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .verified-badge {
            background: #1DA1F2;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }
        .nav-button {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
        }
        .nav-button.active {
            background: rgba(255,255,255,0.3);
        }

        /* ===== АДМИН-ПАНЕЛЬ ===== */
        .admin-panel {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
            border: 2px solid #f1c40f;
            border-radius: 60px;
            padding: 30px;
            margin-bottom: 30px;
            color: white;
            display: none;
        }
        .admin-panel.visible {
            display: block;
        }
        .admin-panel h3 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #f1c40f;
        }
        .admin-section {
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .admin-section h4 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #f1c40f;
        }
        .preview-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .preview-button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 15px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .admin-button {
            background: #f1c40f;
            color: #1a1a1a;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }

        /* Посты */
        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
        }
        .feed { grid-column: 1; }
        .post-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 20px;
            color: white;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .post-author { font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .post-time { color: rgba(255,255,255,0.6); font-size: 0.9rem; }
        .post-stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 15px;
        }
        .like-button, .comment-button { cursor: pointer; }
        .liked { color: #ff6b6b; }

        .comments-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed rgba(255,215,0,0.3);
        }
        .comment {
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
            padding: 15px;
            margin: 10px 0;
        }
        .comment-author {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            margin-bottom: 5px;
        }

        .sidebar-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 20px;
            color: white;
        }

        .post-form {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            padding: 25px;
            margin-bottom: 25px;
        }
        .post-form textarea {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            color: white;
            margin-bottom: 15px;
        }
        .post-form button {
            background: rgba(255,215,0,0.3);
            border: 1px solid rgba(255,215,0,0.4);
            color: white;
            padding: 12px 30px;
            border-radius: 60px;
            cursor: pointer;
        }

        .profile-header {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            padding: 30px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 30px;
            color: white;
        }

        .load-more {
            text-align: center;
            margin: 30px 0;
        }
        .load-more button {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 15px 40px;
            border-radius: 60px;
            cursor: pointer;
        }

        .logout-button {
            background: rgba(231,76,60,0.3);
            border: 1px solid rgba(231,76,60,0.4);
            color: white;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
        }
    </style>
</head>
<body class="day">
    <header class="site-header">
        <h1>Seti.kolokrug</h1>
    </header>

    <!-- Политика -->
    <div class="privacy-popup" id="privacyPopup">
        <div class="privacy-card">
            <h2>🍞 Политика конфиденциальности</h2>
            <p>Мы используем куки для работы сайта</p>
            <button class="privacy-button accept" onclick="acceptPrivacy()">Принять</button>
        </div>
    </div>

    <!-- Вход -->
    <div class="login-modal" id="loginModal">
        <div class="login-card">
            <h2>👋 Вход в Kolocrug</h2>
            <input type="text" id="usernameInput" placeholder="Ваш username">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button onclick="handleLogin()">Войти</button>
            <div id="loginError" style="color: #ff6b6b; text-align: center;"></div>
        </div>
    </div>

    <!-- Основное -->
    <div class="main-content" id="mainContent">
        <div class="container">
            <div class="top-bar">
                <div class="user-info" style="display: flex; align-items: center; gap: 15px;">
                    <div class="kolobok">🍞</div>
                    <div class="username" id="displayUsername"></div>
                </div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <div class="time-info" id="timeInfo">⏰</div>
                    <div class="nav-buttons">
                        <button class="nav-button active" id="feedBtn" onclick="showFeed()">Лента</button>
                        <button class="nav-button" id="subscriptionsBtn" onclick="showSubscriptions()">Подписки</button>
                        <button class="nav-button" onclick="showProfile(localStorage.getItem('username'))">Профиль</button>
                    </div>
                    <button class="logout-button" onclick="logout()">Выйти</button>
                </div>
            </div>

            <!-- АДМИН-ПАНЕЛЬ -->
            <div class="admin-panel" id="adminPanel">
                <h3>⚡ Админ-панель</h3>
                
                <div class="admin-section">
                    <h4>🎨 Режим превью</h4>
                    <div class="preview-controls">
                        <button class="preview-button" onclick="previewGradient('morning')">🌅 Утро</button>
                        <button class="preview-button" onclick="previewGradient('day')">☀️ День</button>
                        <button class="preview-button" onclick="previewGradient('sunset')">🌇 Закат</button>
                        <button class="preview-button" onclick="previewGradient('night')">🌃 Ночь</button>
                    </div>
                </div>

                <div class="admin-section">
                    <h4>⚙️ Управление</h4>
                    <button class="admin-button" onclick="clearAllPosts()">🗑️ Удалить все посты</button>
                </div>
            </div>

            <div id="dynamicContent"></div>
        </div>
    </div>

    <script>
        // ===== ФУНКЦИЯ ДЛЯ ПРАВИЛЬНЫХ ПАДЕЖЕЙ =====
        function getCorrectForm(topic, case_type) {
            const forms = {
                'фотография': { acc: 'фотографию', ins: 'фотографией', prep: 'фотографии' },
                'путешествие': { acc: 'путешествие', ins: 'путешествием', prep: 'путешествии' },
                'музыка': { acc: 'музыку', ins: 'музыкой', prep: 'музыке' },
                'кино': { acc: 'кино', ins: 'кино', prep: 'кино' },
                'книги': { acc: 'книги', ins: 'книгами', prep: 'книгах' },
                'спорт': { acc: 'спорт', ins: 'спортом', prep: 'спорте' },
                'еда': { acc: 'еду', ins: 'едой', prep: 'еде' },
                'технологии': { acc: 'технологии', ins: 'технологиями', prep: 'технологиях' },
                'искусство': { acc: 'искусство', ins: 'искусством', prep: 'искусстве' },
                'наука': { acc: 'науку', ins: 'наукой', prep: 'науке' },
                'йога': { acc: 'йогу', ins: 'йогой', prep: 'йоге' },
                'психология': { acc: 'психологию', ins: 'психологией', prep: 'психологии' },
                'бизнес': { acc: 'бизнес', ins: 'бизнесом', prep: 'бизнесе' },
                'крипта': { acc: 'крипту', ins: 'криптой', prep: 'крипте' },
                'нейросети': { acc: 'нейросети', ins: 'нейросетями', prep: 'нейросетях' },
                'космос': { acc: 'космос', ins: 'космосом', prep: 'космосе' },
                'авто': { acc: 'авто', ins: 'авто', prep: 'авто' },
                'фитнес': { acc: 'фитнес', ins: 'фитнесом', prep: 'фитнесе' },
                'рецепты': { acc: 'рецепты', ins: 'рецептами', prep: 'рецептах' },
                'кафе': { acc: 'кафе', ins: 'кафе', prep: 'кафе' }
            };
            return forms[topic]?.[case_type] || topic;
        }

        // ===== ФУНКЦИЯ ДЛЯ ПРАВИЛЬНЫХ ОКОНЧАНИЙ =====
        function pluralLikes(count) {
            if (count % 10 === 1 && count % 100 !== 11) return 'лайк';
            if ([2,3,4].includes(count % 10) && ![12,13,14].includes(count % 100)) return 'лайка';
            return 'лайков';
        }

        function pluralComments(count) {
            if (count % 10 === 1 && count % 100 !== 11) return 'комментарий';
            if ([2,3,4].includes(count % 10) && ![12,13,14].includes(count % 100)) return 'комментария';
            return 'комментариев';
        }

        function pluralMinutes(count) {
            if (count % 10 === 1 && count % 100 !== 11) return 'минуту';
            if ([2,3,4].includes(count % 10) && ![12,13,14].includes(count % 100)) return 'минуты';
            return 'минут';
        }

        // ===== ПОЛИТИКА =====
        function acceptPrivacy() {
            document.getElementById('privacyPopup').classList.add('hidden');
        }

        // ===== АДМИНЫ (ТОЛЬКО ЭТИ ДВА) =====
        const ADMIN_USERNAMES = ['BUBLEMERC', 'KacERORga'];
        const ADMIN_PASSWORD = '6369';

        // ===== РЕАЛЬНЫЕ ПОЛЬЗОВАТЕЛИ (админов тут НЕТ) =====
        const realUsers = [
            'alex_foto', 'misha_travel', 'lena_music', 'dima_kino', 'olga_books', 
            'anton_sport', 'sveta_food', 'pavel_tech', 'nina_art', 'igor_science',
            'katya_yoga', 'vova_psy', 'tanya_biz', 'sasha_crypto', 'rita_ai',
            'danya_space', 'liza_auto', 'maks_fitness', 'ksenia_cafe', 'artem_design'
        ];

        // ===== ВЕРИФИКАЦИЯ =====
        let verifiedUsers = new Set(['cyberphoenix', 'neonwolf', 'BUBLEMERC', 'KacERORga']);

        // ===== ПОДПИСКИ =====
        let subscriptions = new Set();

        function loadSubscriptions() {
            const saved = localStorage.getItem('subs_' + localStorage.getItem('username'));
            if (saved) subscriptions = new Set(JSON.parse(saved));
        }

        function saveSubscriptions() {
            localStorage.setItem('subs_' + localStorage.getItem('username'), JSON.stringify([...subscriptions]));
        }

        function toggleSubscribe(username) {
            if (subscriptions.has(username)) subscriptions.delete(username);
            else subscriptions.add(username);
            saveSubscriptions();
            refreshView();
        }

        // ===== ПОСТЫ ТОЛЬКО ОТ РЕАЛЬНЫХ ПОЛЬЗОВАТЕЛЕЙ =====
        function generateRealisticPost(index) {
            const topics = [
                'фотография', 'путешествие', 'музыка', 'кино', 'книги', 'спорт', 'еда', 'технологии', 'искусство', 'наука',
                'йога', 'психология', 'бизнес', 'крипта', 'нейросети', 'космос', 'авто', 'фитнес', 'рецепты', 'кафе'
            ];
            
            const templates = [
                (topic, acc) => `Сегодня снимал ${acc}`,
                (topic, acc) => `В выходные поеду в ${acc}`,
                (topic, acc) => `Слушаю новую ${acc}`,
                (topic, acc) => `Посмотрел отличный ${acc}`,
                (topic, acc) => `Читаю интересные ${acc}`,
                (topic, acc) => `Хожу на ${acc} каждый день`,
                (topic, acc) => `Приготовил вкусную ${acc}`,
                (topic, acc) => `Купил новые ${acc}`,
                (topic, acc) => `Рисую ${acc}`,
                (topic, acc) => `Узнал новое о ${getCorrectForm(topic, 'prep')}`,
                (topic, acc) => `Занимаюсь ${getCorrectForm(topic, 'ins')} по утрам`,
                (topic, acc) => `Читаю книги по ${getCorrectForm(topic, 'dat') || topic}`,
                (topic, acc) => `Разбираюсь в ${getCorrectForm(topic, 'prep')}`,
                (topic, acc) => `Интересуюсь ${getCorrectForm(topic, 'ins')}`,
                (topic, acc) => `Тестирую новые ${acc}`,
                (topic, acc) => `Наблюдаю за ${getCorrectForm(topic, 'ins')}`,
                (topic, acc) => `Мечтаю о новом ${acc}`,
                (topic, acc) => `Бегаю по утрам, люблю ${acc}`,
                (topic, acc) => `Готовлю по новым ${getCorrectForm(topic, 'dat') || topic}`,
                (topic, acc) => `Хожу в любимое ${acc}`
            ];
            
            const topic = topics[index % topics.length];
            const accForm = getCorrectForm(topic, 'acc');
            const template = templates[index % templates.length];
            
            return template(topic, accForm) + ' #' + topic;
        }

        let posts = [];
        let postsDisplayed = 20;
        let currentView = 'feed';
        let currentProfile = null;

        function generatePosts(count = 300) {
            const newPosts = [];
            for (let i = 0; i < count; i++) {
                // БЕРЁМ ТОЛЬКО ИЗ realUsers (админов тут нет!)
                const author = realUsers[Math.floor(Math.random() * realUsers.length)];
                const content = generateRealisticPost(i);
                
                const likes = Math.floor(Math.random() * 147) + 3;
                
                const comments = [];
                const commentCount = Math.floor(Math.random() * 5);
                for (let j = 0; j < commentCount; j++) {
                    comments.push({
                        author: realUsers[Math.floor(Math.random() * realUsers.length)],
                        text: `Круто! 👍`
                    });
                }

                const minutes = Math.floor(Math.random() * 120) + 1;
                const timeText = `${minutes} ${pluralMinutes(minutes)} назад`;

                newPosts.push({
                    id: i + Date.now(),
                    author,
                    content,
                    likes: likes,
                    liked: false,
                    comments,
                    time: timeText,
                    likesText: `${likes} ${pluralLikes(likes)}`
                });
            }
            // Перемешиваем
            for (let i = newPosts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newPosts[i], newPosts[j]] = [newPosts[j], newPosts[i]];
            }
            return newPosts;
        }

        const topics = [
            'фотография', 'путешествие', 'музыка', 'кино', 'книги', 'спорт', 'еда', 'технологии', 'искусство', 'наука',
            'йога', 'психология', 'бизнес', 'крипта', 'нейросети', 'космос', 'авто', 'фитнес', 'рецепты', 'кафе'
        ];
        
        posts = generatePosts(300);

        // ===== АДМИН-ФУНКЦИИ =====
        function previewGradient(timeOfDay) {
            document.body.className = timeOfDay;
        }

        function clearAllPosts() {
            if (confirm('Удалить все посты?')) {
                posts = generatePosts(300);
                refreshView();
                alert('Сгенерированы новые посты от реальных пользователей!');
            }
        }

        // ===== ОСНОВНЫЕ ФУНКЦИИ =====
        function refreshView() {
            if (currentView === 'feed') showFeed();
            else if (currentView === 'subscriptions') showSubscriptions();
            else if (currentView === 'profile') showProfile(currentProfile);
        }

        function showFeed() {
            currentView = 'feed';
            document.getElementById('feedBtn').classList.add('active');
            document.getElementById('subscriptionsBtn').classList.remove('active');
            renderFeed();
        }

        function showSubscriptions() {
            currentView = 'subscriptions';
            document.getElementById('feedBtn').classList.remove('active');
            document.getElementById('subscriptionsBtn').classList.add('active');
            renderSubscriptions();
        }

        function showProfile(username) {
            currentView = 'profile';
            currentProfile = username;
            renderProfile();
        }

        function renderFeed() {
            let html = `
                <div class="post-form">
                    <textarea id="postContent" placeholder="Что нового?" rows="3"></textarea>
                    <button onclick="createPost()">Опубликовать</button>
                </div>
                <div class="grid">
                    <div class="feed">
            `;

            posts.slice(0, postsDisplayed).forEach(post => {
                const verified = verifiedUsers.has(post.author) ? '<span class="verified-badge">✓</span>' : '';
                
                const likesText = `${post.likes} ${pluralLikes(post.likes)}`;
                const commentsText = `${post.comments.length} ${pluralComments(post.comments.length)}`;
                
                html += `
                    <div class="post-card">
                        <div class="post-header" onclick="showProfile('${post.author}')">
                            <div class="kolobok-small">🍞</div>
                            <div>
                                <div class="post-author">@${post.author} ${verified}</div>
                                <div class="post-time">${post.time}</div>
                            </div>
                        </div>
                        <div class="post-content">${post.content}</div>
                        <div class="post-stats">
                            <span class="like-button ${post.liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                                ❤️ ${likesText}
                            </span>
                            <span class="comment-button" onclick="toggleComments(${post.id})">
                                💬 ${commentsText}
                            </span>
                        </div>
                        <div class="comments-section" id="comments-${post.id}" style="display: none;">
                            ${post.comments.map(c => `
                                <div class="comment">
                                    <div class="comment-author" onclick="showProfile('${c.author}')">
                                        <span class="kolobok-small">🍞</span> @${c.author}
                                    </div>
                                    <div>${c.text}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                    <div class="sidebar">
                        <div class="sidebar-card">
                            <h3>🔥 Активные</h3>
                            ${realUsers.slice(0, 5).map(u => `
                                <div style="margin: 10px 0; cursor: pointer;" onclick="showProfile('${u}')">
                                    🍞 @${u}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                <div class="load-more">
                    <button onclick="loadMore()">⬇️ Ещё посты</button>
                </div>
            `;

            document.getElementById('dynamicContent').innerHTML = html;
        }

        function renderSubscriptions() {
            const subPosts = posts.filter(p => subscriptions.has(p.author));
            
            if (subscriptions.size === 0) {
                document.getElementById('dynamicContent').innerHTML = `
                    <div style="text-align: center; color: white; padding: 50px;">
                        <h2>😢 Нет подписок</h2>
                        <button class="nav-button" onclick="showFeed()">В ленту</button>
                    </div>
                `;
                return;
            }

            let html = '<div class="feed">';
            subPosts.slice(0, postsDisplayed).forEach(post => {
                html += `<div class="post-card">@${post.author}: ${post.content}</div>`;
            });
            html += '</div>';
            document.getElementById('dynamicContent').innerHTML = html;
        }

        function renderProfile() {
            const userPosts = posts.filter(p => p.author === currentProfile);
            
            let html = `
                <div class="profile-header">
                    <div class="profile-avatar">🍞</div>
                    <div>
                        <h2>@${currentProfile} ${verifiedUsers.has(currentProfile) ? '<span class="verified-badge">✓</span>' : ''}</h2>
                        <p>Постов: ${userPosts.length}</p>
                    </div>
                </div>
                <div class="feed">
            `;

            userPosts.slice(0, 10).forEach(post => {
                html += `<div class="post-card">${post.content}</div>`;
            });

            html += '</div>';
            document.getElementById('dynamicContent').innerHTML = html;
        }

        function toggleLike(postId) {
            const post = posts.find(p => p.id == postId);
            if (post) {
                if (post.liked) {
                    post.likes--;
                } else {
                    post.likes++;
                }
                post.liked = !post.liked;
                refreshView();
            }
        }

        function toggleComments(postId) {
            const div = document.getElementById(`comments-${postId}`);
            if (div) div.style.display = div.style.display === 'none' ? 'block' : 'none';
        }

        function createPost() {
            const content = document.getElementById('postContent').value.trim();
            const currentUser = localStorage.getItem('username');
            
            if (!content) return;
            
            // Админы тоже могут писать посты, если захотят
            posts.unshift({
                id: Date.now(),
                author: currentUser,
                content: content,
                likes: 0,
                liked: false,
                comments: [],
                time: 'только что'
            });
            refreshView();
            document.getElementById('postContent').value = '';
        }

        function loadMore() {
            postsDisplayed += 20;
            refreshView();
        }

        // ===== ВХОД =====
        function handleLogin() {
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            
            if (!username) {
                document.getElementById('loginError').textContent = 'Введите username';
                return;
            }

            if (ADMIN_USERNAMES.includes(username)) {
                if (password !== ADMIN_PASSWORD) {
                    document.getElementById('loginError').textContent = 'Неверный пароль';
                    return;
                }
                localStorage.setItem('isAdmin', 'true');
            } else {
                localStorage.setItem('isAdmin', 'false');
            }

            localStorage.setItem('username', username);
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('displayUsername').innerHTML = '@' + username + (verifiedUsers.has(username) ? '<span class="verified-badge">✓</span>' : '');
            
            const adminPanel = document.getElementById('adminPanel');
            if (ADMIN_USERNAMES.includes(username)) {
                adminPanel.classList.add('visible');
            } else {
                adminPanel.classList.remove('visible');
            }
            
            loadSubscriptions();
            showFeed();
        }

        function logout() {
            localStorage.removeItem('username');
            localStorage.removeItem('isAdmin');
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('adminPanel').classList.remove('visible');
        }

        // ===== ВРЕМЯ =====
        function updateTime() {
            const hours = new Date().getHours();
            document.getElementById('timeInfo').textContent = hours + ':00';
            
            if (hours >= 6 && hours < 12) document.body.className = 'morning';
            else if (hours >= 12 && hours < 18) document.body.className = 'day';
            else if (hours >= 18 && hours < 21) document.body.className = 'sunset';
            else document.body.className = 'night';
        }

        // ===== ЗАПУСК =====
        window.onload = function() {
            document.getElementById('privacyPopup').classList.remove('hidden');
            
            if (localStorage.getItem('username')) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('displayUsername').textContent = '@' + localStorage.getItem('username');
                
                const username = localStorage.getItem('username');
                if (ADMIN_USERNAMES.includes(username)) {
                    document.getElementById('adminPanel').classList.add('visible');
                }
                
                loadSubscriptions();
                showFeed();
            }
            
            updateTime();
            setInterval(updateTime, 60000);
        };
    </script>
</body>
</html>
