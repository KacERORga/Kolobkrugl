<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolocrug — Seti.KOoOlobok</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="shortcut icon" href="/favicon.png" type="image/png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-icon-180x180.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        /* --- все стили как в предыдущей версии (для краткости не повторяю, но в финальном файле они будут) --- */
        /* Здесь нужно вставить полные стили из предыдущего ответа */
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌙 Тёмная тема</button>
    <div id="swipe-arrow" class="swipe-arrow hidden"><span>➡️</span></div>

    <!-- Панели настроек (полностью из предыдущего ответа) -->
    <div class="settings-panel" id="settingsPanel">...</div>
    <div class="settings-panel" id="adminSettingsPanel">...</div>
    <div id="maintenance-page">...</div>

    <div id="main-interface">
        <div class="container" id="app">
            <!-- основной контент (полностью из предыдущего ответа) -->
        </div>
    </div>

    <!-- AI чат, поддержка, полноэкранный режим (полностью из предыдущего ответа) -->
    <div id="ai-chat-button">...</div>
    <div id="fullscreen-btn">...</div>
    <div id="support-button">...</div>
    <div id="support-window">...</div>

    <!-- Баннер политики конфиденциальности (исправленный) -->
    <div id="privacy-banner" style="position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); color: white; padding: 15px 30px; text-align: center; z-index: 99999; font-family: sans-serif; border-top: 3px solid gold; display: flex; flex-direction: column; align-items: center; gap: 10px;">
        <div style="position: relative; width: 100%;">
            <span onclick="handleCloseBanner()" style="position: absolute; top: -5px; right: 0; font-size: 24px; cursor: pointer;">&times;</span>
            <p style="margin-bottom: 5px; font-size: 14px; max-width: 90%;">
                ⚖️ Используя сайт, вы соглашаетесь с <strong>Политикой конфиденциальности</strong> и <strong>Пользовательским соглашением</strong>.<br>
                Мы собираем имя пользователя, IP-адрес и данные cookie для работы сайта. Данные не передаются третьим лицам.<br>
                <span style="color: gold;">Владелец сайта: KacERORga_CoolKroog</span>
            </p>
        </div>
        <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap; justify-content: center;">
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="checkbox" id="accept-checkbox" style="width: 18px; height: 18px;"> 
                <span style="font-size: 14px;">Я принимаю условия</span>
            </label>
            <button onclick="acceptPrivacy()" style="background: gold; border: none; padding: 8px 25px; border-radius: 40px; font-weight: bold; cursor: pointer;">Принять</button>
        </div>
    </div>

    <script>
        (function() {
            // ========== ПОЛНЫЙ ИСПРАВЛЕННЫЙ КОД ==========
            // (включает все функции и инициализацию из предыдущего ответа,
            // с обязательным экспортом функций acceptPrivacy и handleCloseBanner в window)

            // ... (весь предыдущий код скрипта, который мы разработали) ...

            // ===== ВАЖНО: экспорт функций для кнопок политики =====
            window.acceptPrivacy = function() {
                const acceptCheckbox = document.getElementById('accept-checkbox');
                if (acceptCheckbox && acceptCheckbox.checked) {
                    localStorage.setItem('privacy_accepted', 'true');
                    document.getElementById('privacy-banner').style.display = 'none';
                    document.getElementById('main-interface').classList.remove('blocked');
                } else {
                    alert('Пожалуйста, отметьте галочку, чтобы принять политику конфиденциальности.');
                }
            };

            window.handleCloseBanner = function() {
                const acceptCheckbox = document.getElementById('accept-checkbox');
                if (acceptCheckbox && acceptCheckbox.checked) {
                    localStorage.setItem('privacy_accepted', 'true');
                    document.getElementById('privacy-banner').style.display = 'none';
                    document.getElementById('main-interface').classList.remove('blocked');
                } else {
                    alert('Сначала отметьте галочку, чтобы принять условия.');
                }
            };

            // Проверка при загрузке
            if (localStorage.getItem('privacy_accepted') === 'true') {
                document.getElementById('privacy-banner').style.display = 'none';
                document.getElementById('main-interface').classList.remove('blocked');
            } else {
                document.getElementById('main-interface').classList.add('blocked');
            }

            // Остальной код инициализации...
            // (здесь должен быть весь остальной JS, который был в предыдущем ответе)
        })();
    </script>
    <script>
        // Service Worker регистрация
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
        }
    </script>
</body>
</html>
